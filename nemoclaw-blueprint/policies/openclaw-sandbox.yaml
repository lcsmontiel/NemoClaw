#
# Default policy for the OpenClaw sandbox.
# Principle: deny by default, allow only what's needed for core functionality.
# Dynamic updates (network_policies, inference) can be applied post-creation
# via `openshell policy set`. Static fields are effectively creation-locked.
#
# Policy tiers (future):
#   default — this file. Minimum for onboard + basic agent operation.
#   relaxed — adds third-party model providers, broader web access.
#
# To add endpoints: update this file and re-run `nemoclaw onboard`
# or apply dynamically via `openshell policy set`.

version: 1

filesystem_policy:
  include_workdir: true
  read_only:
    - /usr
    - /lib
    - /proc
    - /dev/urandom
    - /app
    - /etc
    - /var/log
    - /sandbox/.openclaw            # Immutable gateway config — prevents agent
                                    # from tampering with auth tokens or CORS.
                                    # Writable state (agents, plugins) lives in
                                    # /sandbox/.openclaw-data via symlinks.
                                    # Ref: https://github.com/NVIDIA/NemoClaw/issues/514
  read_write:
    - /sandbox
    - /tmp
    - /dev/null
    - /sandbox/.openclaw-data       # Writable agent/plugin state (symlinked from .openclaw)

landlock:
  compatibility: best_effort

process:
  run_as_user: sandbox
  run_as_group: sandbox

# Note: tls: terminate annotations removed — OpenShell >= 0.0.15 auto-detects
# TLS and terminates unconditionally for credential injection (PR #544).
# Endpoints with permissive wildcard rules (method: "*") simplified to L4-only.
# Restrictive L7 rules (GET-only, path-scoped) retained for enforcement.

network_policies:
  claude_code:
    name: claude_code
    endpoints:
      - host: api.anthropic.com
        port: 443
        protocol: rest
        enforcement: enforce
      - host: statsig.anthropic.com
        port: 443
      - host: sentry.io
        port: 443
    binaries:
      - { path: /usr/local/bin/claude }

  nvidia:
    name: nvidia
    endpoints:
      - host: integrate.api.nvidia.com
        port: 443
        protocol: rest
        enforcement: enforce
      - host: inference-api.nvidia.com
        port: 443
        protocol: rest
        enforcement: enforce
    binaries:
      - { path: /usr/local/bin/claude }
      - { path: /usr/local/bin/openclaw }

  github:
    name: github
    endpoints:
      - host: github.com
        port: 443
        access: full
      - host: api.github.com
        port: 443
        access: full
    binaries:
      - { path: /usr/bin/gh }
      - { path: /usr/bin/git }

  # ── OpenClaw "phone home" ────────────────────────────────────────────
  # Minimum viable set for OpenClaw to authenticate, discover plugins,
  # and reach ClawHub. Binary-restricted to openclaw only.
  # Docs access is read-only (GET). ClawHub and openclaw.ai are
  # restricted to GET+POST (auth flows, plugin discovery).

  clawhub:
    name: clawhub
    endpoints:
      - host: clawhub.com
        port: 443
        protocol: rest
        enforcement: enforce
        rules:
          - allow: { method: GET, path: "/**" }
          - allow: { method: POST, path: "/**" }
    binaries:
      - { path: /usr/local/bin/openclaw }

  openclaw_api:
    name: openclaw_api
    endpoints:
      - host: openclaw.ai
        port: 443
        protocol: rest
        enforcement: enforce
        rules:
          - allow: { method: GET, path: "/**" }
          - allow: { method: POST, path: "/**" }
    binaries:
      - { path: /usr/local/bin/openclaw }

  openclaw_docs:
    name: openclaw_docs
    endpoints:
      - host: docs.openclaw.ai
        port: 443
        protocol: rest
        enforcement: enforce
        rules:
          - allow: { method: GET, path: "/**" }
    binaries:
      - { path: /usr/local/bin/openclaw }

  # npm registry — needed for `openclaw plugins install` and `npm install`
  npm_registry:
    name: npm_registry
    endpoints:
      - host: registry.npmjs.org
        port: 443
        access: full
    binaries:
      - { path: /usr/local/bin/openclaw }
      - { path: /usr/local/bin/npm }

  # ── Messaging — pre-allowed for agent notifications ────────────
  # Telegram and Discord are open by default so the agent can send
  # notifications and respond to chats without triggering approval.
  telegram:
    name: telegram
    endpoints:
      - host: api.telegram.org
        port: 443
        protocol: rest
        enforcement: enforce
        rules:
          - allow: { method: GET, path: "/bot*/**" }
          - allow: { method: POST, path: "/bot*/**" }

  discord:
    name: discord
    endpoints:
      - host: discord.com
        port: 443
        protocol: rest
        enforcement: enforce
        rules:
          - allow: { method: GET, path: "/**" }
          - allow: { method: POST, path: "/**" }
      - host: gateway.discord.gg
        port: 443
        protocol: rest
        enforcement: enforce
        rules:
          - allow: { method: GET, path: "/**" }
          - allow: { method: POST, path: "/**" }
      - host: cdn.discordapp.com
        port: 443
        protocol: rest
        enforcement: enforce
        rules:
          - allow: { method: GET, path: "/**" }

# ── Mutable config fields ────────────────────────────────────────────
# Fields listed here can be overridden at runtime via `nemoclaw config set`
# or `openshell settings set` without sandbox recreation.
# OpenClaw hot-reloads when the overrides file changes.
#
# Three-tier resolution:
#   1. Frozen openclaw.json  (gateway.auth.token, CORS — always immutable)
#   2. Policy defaults below (baseline for mutable fields)
#   3. User overrides        (runtime changes via nemoclaw config set)
#
# gateway.* is always stripped from the overrides file at load time,
# regardless of whether it appears here.

config_overrides:
  agents.defaults.model.primary:
    default: "inference/nvidia/nemotron-3-super-120b-a12b"
  models.providers.nvidia.models:
    default:
      - id: nemotron-3-super-120b-a12b
        name: nvidia/nemotron-3-super-120b-a12b
        reasoning: false
        input: [text]
        cost: { input: 0, output: 0, cacheRead: 0, cacheWrite: 0 }
        contextWindow: 131072
        maxTokens: 4096
  models.providers.inference.models:
    default:
      - id: nvidia/nemotron-3-super-120b-a12b
        name: nvidia/nemotron-3-super-120b-a12b
        reasoning: false
        input: [text]
        cost: { input: 0, output: 0, cacheRead: 0, cacheWrite: 0 }
        contextWindow: 131072
        maxTokens: 4096
  channels.defaults.configWrites:
    default: false
